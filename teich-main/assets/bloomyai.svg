<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#FF69B4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Flower Icon -->
  <g transform="translate(60, 60)">
    <!-- Petals -->
    <ellipse cx="0" cy="-25" rx="12" ry="20" fill="url(#petalGradient)" opacity="0.9"/>
    <ellipse cx="0" cy="25" rx="12" ry="20" fill="url(#petalGradient)" opacity="0.9"/>
    <ellipse cx="-25" cy="0" rx="20" ry="12" fill="url(#petalGradient)" opacity="0.9"/>
    <ellipse cx="25" cy="0" rx="20" ry="12" fill="url(#petalGradient)" opacity="0.9"/>
    <ellipse cx="-18" cy="-18" rx="12" ry="12" fill="url(#petalGradient)" opacity="0.85" transform="rotate(-45)"/>
    <ellipse cx="18" cy="-18" rx="12" ry="12" fill="url(#petalGradient)" opacity="0.85" transform="rotate(45)"/>
    <ellipse cx="-18" cy="18" rx="12" ry="12" fill="url(#petalGradient)" opacity="0.85" transform="rotate(45)"/>
    <ellipse cx="18" cy="18" rx="12" ry="12" fill="url(#petalGradient)" opacity="0.85" transform="rotate(-45)"/>
    
    <!-- Center star -->
    <polygon points="0,-12 3,-4 11,-4 5,2 7,10 0,5 -7,10 -5,2 -11,-4 -3,-4" fill="#0F0F3D" filter="url(#glow)"/>
    
    <!-- Circuit board stamens -->
    <path d="M-8,0 L-15,0 L-18,-5 L-22,-5" stroke="#FF69B4" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-22" cy="-5" r="3" fill="#FF69B4"/>
    
    <path d="M8,0 L15,0 L18,5 L22,5" stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="22" cy="5" r="3" fill="#A855F7"/>
    
    <path d="M0,8 L0,15 L-5,18 L-5,22" stroke="#6366F1" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-5" cy="22" r="3" fill="#6366F1"/>
  </g>
  
  <!-- Text -->
  <text x="110" y="75" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0F0F3D">Bloomy</text>
  <text x="235" y="75" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGradient)">AI</text>
</svg>
