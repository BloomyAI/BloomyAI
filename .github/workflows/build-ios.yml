name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd mobile-app
        npm ci
    
    - name: Install CocoaPods
      run: |
        cd mobile-app/ios
        pod install
    
    - name: Build iOS App
      run: |
        cd mobile-app/ios
        xcodebuild -workspace BloomyAI.xcworkspace -scheme BloomyAI -configuration Release -archivePath build/BloomyAI.xcarchive archive
    
    - name: Export IPA
      run: |
        cd mobile-app/ios
        xcodebuild -exportArchive -archivePath build/BloomyAI.xcarchive -exportPath build/export -exportOptionsPlist ExportOptions.plist
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: bloomy-ios-ipa
        path: mobile-app/ios/build/export/*.ipa
