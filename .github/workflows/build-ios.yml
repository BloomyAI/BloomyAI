name: Build iOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: mobile-app/package-lock.json

    - name: Install JS dependencies
      working-directory: mobile-app
      run: npm install

    - name: Install CocoaPods
      working-directory: mobile-app/ios
      run: pod install

    - name: Build iOS App (unsigned, simulator)
      working-directory: mobile-app/ios
      run: |
        xcodebuild \
          -workspace BloomyAI.xcworkspace \
          -scheme BloomyAI \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: bloomy-ios-build
        path: mobile-app/ios/build/Build/Products/Release-iphonesimulator/BloomyAI.app
